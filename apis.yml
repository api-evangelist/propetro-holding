aid: propetro-holding
name: ProPetro Holding
description: >-
  ProPetro Holding Corp (NYSE: PUMP) is a Midland, Texas-based oilfield
  services company that "provides hydraulic fracturing and other complementary
  services to leading upstream oil and gas companies engaged in the exploration
  and production of North American unconventional oil and natural gas
  resources," operating principally in the Permian Basin. Service lines include
  hydraulic fracturing, the FORCE electric fleet (eFleet), Silvertip Wireline,
  cementing, PROPWR power solutions, and Aqua Prop water management. ProPetro
  does not publish a public developer API, OpenAPI specification, SDK, or
  technology developer portal.
